<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revenue Reconciliation Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F7F4EF; font-family: 'DM Mono', monospace; color: #1A1A1A; padding: 32px 24px; }

  .header { max-width: 1280px; margin: 0 auto 28px; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .header h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 600; color: #1A2B4B; }
  .header .sub { font-size: 10px; color: #888780; letter-spacing: 0.06em; text-transform: uppercase; margin-top: 3px; }
  .period-badge { background: #1A2B4B; color: #F7F4EF; font-size: 10px; padding: 4px 10px; border-radius: 3px; }

  /* Summary KPIs */
  .kpi-row { max-width: 1280px; margin: 0 auto 24px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .kpi { background: white; border: 1px solid #D3D1C7; border-radius: 4px; padding: 14px 16px; }
  .kpi .label { font-size: 9px; color: #888780; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
  .kpi .value { font-size: 1.5rem; font-weight: 600; color: #1A2B4B; font-family: 'Playfair Display', serif; }
  .kpi .sub-value { font-size: 10px; color: #888780; margin-top: 2px; }
  .kpi.accent { border-top: 3px solid #E8621A; }
  .kpi.warning { border-top: 3px solid #2E3E5A; }

  /* Filter bar */
  .filters { max-width: 1280px; margin: 0 auto 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .filter-label { font-size: 10px; color: #888780; letter-spacing: 0.06em; text-transform: uppercase; }
  .filter-btn { border: 1px solid #D3D1C7; background: white; padding: 5px 12px; font-family: 'DM Mono', monospace; font-size: 10px; cursor: pointer; border-radius: 3px; color: #1A1A1A; transition: all 0.15s; }
  .filter-btn.active { background: #1A2B4B; color: white; border-color: #1A2B4B; }
  .filter-btn.active.orange { background: #E8621A; border-color: #E8621A; }
  .pill { display: inline-flex; align-items: center; gap: 6px; background: #1A2B4B; color: white; font-size: 9px; padding: 3px 8px; border-radius: 10px; }

  /* Table */
  .table-wrap { max-width: 1280px; margin: 0 auto; background: white; border: 1px solid #D3D1C7; border-radius: 4px; overflow: hidden; }
  .table-header { background: #1A2B4B; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; }
  .table-header .title { font-size: 11px; color: white; font-weight: 500; }
  .table-header .count { font-size: 10px; color: #888780; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  thead th { background: #F7F4EF; padding: 9px 12px; text-align: left; font-size: 9px; color: #888780; letter-spacing: 0.08em; text-transform: uppercase; border-bottom: 1px solid #D3D1C7; cursor: pointer; user-select: none; white-space: nowrap; }
  thead th:hover { color: #1A1A1A; }
  tbody tr { border-bottom: 1px solid #F0EDE7; transition: background 0.1s; }
  tbody tr:hover { background: #FAFAF7; }
  tbody td { padding: 9px 12px; vertical-align: middle; }

  .badge { display: inline-block; padding: 2px 7px; border-radius: 2px; font-size: 9px; font-weight: 500; white-space: nowrap; }
  .badge-missing   { background: #FDECEA; color: #C0392B; }
  .badge-amount    { background: #FFF3E0; color: #E65100; }
  .badge-period    { background: #E8EAF6; color: #283593; }
  .badge-duplicate { background: #E8F5E9; color: #1B5E20; }
  .badge-matched   { background: #F0F0F0; color: #555; }

  .amount { font-variant-numeric: tabular-nums; }
  .at-risk { color: #E8621A; font-weight: 500; }
  .zero-risk { color: #888780; }

  /* Detail panel */
  .detail-panel { display: none; background: #F7F4EF; border-top: 1px solid #D3D1C7; }
  .detail-panel.open { display: table-row; }
  .detail-content { padding: 12px 16px 12px 40px; }
  .detail-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .detail-item .dl { font-size: 9px; color: #888780; margin-bottom: 2px; }
  .detail-item .dv { font-size: 11px; color: #1A1A1A; }
  .detail-note { margin-top: 10px; font-size: 10px; color: #888780; font-style: italic; border-top: 1px solid #D3D1C7; padding-top: 8px; }

  /* Pagination */
  .pagination { max-width: 1280px; margin: 12px auto 0; display: flex; justify-content: space-between; align-items: center; font-size: 10px; color: #888780; }
  .page-btns { display: flex; gap: 6px; }
  .page-btn { border: 1px solid #D3D1C7; background: white; padding: 4px 10px; font-family: 'DM Mono', monospace; font-size: 10px; cursor: pointer; border-radius: 3px; }
  .page-btn:disabled { opacity: 0.4; cursor: default; }
  .page-btn.active { background: #1A2B4B; color: white; border-color: #1A2B4B; }

  .no-results { padding: 40px; text-align: center; color: #888780; font-size: 12px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>Revenue Reconciliation Monitor</h1>
      <div class="sub">Internal ops view · Crystal Olisa · Operations Generalist</div>
    </div>

  </div>

<div class="kpi-row" id="kpiRow">
  <!-- Populated by JS -->
</div>

<div class="filters">

  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>

  <button class="filter-btn" onclick="setFilter('amount_mismatch', this)">Amount mismatch</button>
  <button class="filter-btn" onclick="setFilter('period_shift', this)">Period shift</button>
  <button class="filter-btn" onclick="setFilter('duplicate', this)">Duplicate</button>
  <button class="filter-btn" onclick="setFilter('matched', this)">Matched</button>

  <span class="filter-label">Product:</span>
  <select id="productFilter" onchange="applyFilters()" style="font-family:'DM Mono',monospace;font-size:10px;border:1px solid #D3D1C7;padding:4px 8px;background:white;border-radius:3px;">
    <option value="all">All products</option>
  </select>
  <span class="filter-label" style="margin-left:8px">Segment:</span>
  <select id="segmentFilter" onchange="applyFilters()" style="font-family:'DM Mono',monospace;font-size:10px;border:1px solid #D3D1C7;padding:4px 8px;background:white;border-radius:3px;">
    <option value="all">All segments</option>
  </select>
  <div id="activePills" style="display:flex;gap:6px;margin-left:8px;flex-wrap:wrap;"></div>
</div>

<div class="table-wrap">

        <th onclick="sortTable('segment')">Segment</th>
        <th onclick="sortTable('processor')">Processor</th>
        <th onclick="sortTable('processor_amount')" style="text-align:right">Proc. amount</th>
        <th onclick="sortTable('booked_amount')" style="text-align:right">Booked</th>
        <th onclick="sortTable('variance_usd')" style="text-align:right">Variance</th>
        <th onclick="sortTable('gap_type')">Gap type</th>
        <th onclick="sortTable('revenue_at_risk')" style="text-align:right">At risk</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="pagination">
  <span id="pageInfo">Showing 0 of 0</span>
  <div class="page-btns" id="pageBtns"></div>
</div>

function populateFilters() {
  const products = [...new Set(allData.map(r => r.product))].sort();
  const segments = [...new Set(allData.map(r => r.segment))].sort();
  const ps = document.getElementById('productFilter');
  const ss = document.getElementById('segmentFilter');
  products.forEach(p => { const o = document.createElement('option'); o.value = p; o.text = p.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); ps.appendChild(o); });
  segments.forEach(s => { const o = document.createElement('option'); o.value = s; o.text = s; ss.appendChild(o); });
}

function buildKPIs() {
  const total       = allData.length;
  const gapRows     = allData.filter(r => r.gap_type !== 'matched');
  const atRiskRows  = allData.filter(r => ['missing','amount_mismatch','duplicate'].includes(r.gap_type));
  const totalRisk   = atRiskRows.reduce((s, r) => s + r.revenue_at_risk, 0);
  const gapRate     = (gapRows.length / total * 100).toFixed(1);
  const periodRows  = allData.filter(r => r.gap_type === 'period_shift');
  const avgLag      = periodRows.length ? (periodRows.reduce((s,r) => s + (r.days_to_detect||0), 0) / periodRows.length).toFixed(0) : 'N/A';

  const kpis = [
    { label: 'Total transactions', value: total.toLocaleString(), sub: 'Jan–Dec 2024', cls: '' },
    { label: 'Transactions with gaps', value: gapRows.length.toLocaleString(), sub: `${gapRate}% of total`, cls: 'warning' },
    { label: 'Revenue at risk', value: '$' + (totalRisk/1000).toFixed(1) + 'k', sub: 'Missing + mismatch + duplicate', cls: 'accent' },
    { label: 'Avg period shift lag', value: avgLag + ' days', sub: 'To month-close detection', cls: 'warning' },
    { label: 'Gap types detected', value: '4', sub: 'Missing · Mismatch · Shift · Duplicate', cls: '' },
  ];
  document.getElementById('kpiRow').innerHTML = kpis.map(k =>
    `<div class="kpi ${k.cls}"><div class="label">${k.label}</div><div class="value">${k.value}</div><div class="sub-value">${k.sub}</div></div>`
  ).join('');
}

// ── Filtering ──────────────────────────────────────────────────────────────
function setFilter(type, btn) {
  currentFilter = type;
  currentPage = 0;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.remove('active','orange');
  });
  btn.classList.add('active');
  if (type !== 'all' && type !== 'matched') btn.classList.add('orange');
  applyFilters();
}

function applyFilters() {
  currentProduct = document.getElementById('productFilter').value;
  currentSegment = document.getElementById('segmentFilter').value;
  currentPage    = 0;

  filteredData = allData.filter(r => {
    if (currentFilter !== 'all' && r.gap_type !== currentFilter) return false;
    if (currentProduct !== 'all' && r.product !== currentProduct) return false;
    if (currentSegment !== 'all' && r.segment !== currentSegment) return false;
    return true;
  });

  // Sort
  filteredData.sort((a, b) => {
    let av = a[currentSort.col], bv = b[currentSort.col];
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    if (av === null) av = -Infinity;
    if (bv === null) bv = -Infinity;
    if (av < bv) return currentSort.dir === 'asc' ? -1 : 1;
    if (av > bv) return currentSort.dir === 'asc' ? 1 : -1;
    return 0;
  });

  updatePills();
  renderTable();
  renderPagination();
}

function updatePills() {
  const pills = [];
  if (currentFilter !== 'all') pills.push(currentFilter.replace('_',' '));
  if (currentProduct !== 'all') pills.push(currentProduct.replace(/_/g,' '));
  if (currentSegment !== 'all') pills.push(currentSegment);
  document.getElementById('activePills').innerHTML = pills.map(p =>
    `<span class="pill">${p}</span>`
  ).join('');
}

// ── Table rendering ────────────────────────────────────────────────────────
function badgeHtml(type) {
  const map = {
    missing: 'badge-missing', amount_mismatch: 'badge-amount',
    period_shift: 'badge-period', duplicate: 'badge-duplicate', matched: 'badge-matched'
  };
  const labels = {
    missing: 'Missing', amount_mismatch: 'Amount mismatch',
    period_shift: 'Period shift', duplicate: 'Duplicate', matched: 'Matched'
  };
  return `<span class="badge ${map[type]||'badge-matched'}">${labels[type]||type}</span>`;
}

function fmt(n) { return n != null ? '$' + parseFloat(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',') : '—'; }

function renderTable() {
  const start = currentPage * PAGE_SIZE;
  const page  = filteredData.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('tableBody');
  document.getElementById('tableCount').textContent = `${filteredData.length.toLocaleString()} records`;

  if (page.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10" class="no-results">No records match the current filters.</td></tr>';
    return;
  }

  tbody.innerHTML = page.map((r, i) => {
    const riskClass = r.revenue_at_risk > 0 ? 'at-risk' : 'zero-risk';
    const riskVal   = r.revenue_at_risk > 0 ? fmt(r.revenue_at_risk) : '—';
    const varVal    = r.variance_usd !== 0 ? fmt(r.variance_usd) : '—';
    const idx       = start + i;
    return `
      <tr onclick="toggleDetail(${idx})" style="cursor:pointer">
        <td style="font-size:10px;color:#888780">${r.transaction_id}</td>
        <td>${r.transaction_date}</td>
        <td style="font-size:10px">${r.product.replace(/_/g,' ')}</td>
        <td style="font-size:10px">${r.segment}</td>
        <td style="font-size:10px">${r.processor}</td>
        <td class="amount" style="text-align:right">${fmt(r.processor_amount)}</td>
        <td class="amount" style="text-align:right">${r.booked_amount != null ? fmt(r.booked_amount) : '—'}</td>
        <td class="amount" style="text-align:right">${varVal}</td>
        <td>${badgeHtml(r.gap_type)}</td>
        <td class="amount ${riskClass}" style="text-align:right">${riskVal}</td>
      </tr>
      <tr id="detail-${idx}" class="detail-panel">
        <td colspan="10">
          <div class="detail-content">
            <div class="detail-grid">
              <div class="detail-item"><div class="dl">Transaction ID</div><div class="dv">${r.transaction_id}</div></div>
              <div class="detail-item"><div class="dl">Processor month</div><div class="dv">${r.processor_month||'—'}</div></div>
              <div class="detail-item"><div class="dl">Booking month</div><div class="dv">${r.booking_month||'—'}</div></div>
              <div class="detail-item"><div class="dl">Days to detect</div><div class="dv">${r.days_to_detect != null ? r.days_to_detect + ' days' : '—'}</div></div>
              <div class="detail-item"><div class="dl">Processor amount</div><div class="dv">${fmt(r.processor_amount)}</div></div>
              <div class="detail-item"><div class="dl">Booked amount</div><div class="dv">${r.booked_amount != null ? fmt(r.booked_amount) : 'Not recorded'}</div></div>
              <div class="detail-item"><div class="dl">Variance</div><div class="dv">${r.variance_usd !== 0 ? fmt(r.variance_usd) + (r.variance_pct ? ' (' + r.variance_pct + '%)' : '') : '—'}</div></div>
              <div class="detail-item"><div class="dl">Revenue at risk</div><div class="dv ${riskClass}">${riskVal}</div></div>
            </div>
            ${r.gap_detail ? `<div class="detail-note">${r.gap_detail}</div>` : ''}
          </div>
        </td>
      </tr>`;
  }).join('');
}

function toggleDetail(idx) {
  const panel = document.getElementById(`detail-${idx}`);
  if (panel) panel.classList.toggle('open');
}

// ── Pagination ─────────────────────────────────────────────────────────────
function renderPagination() {
  const total = filteredData.length;
  const pages = Math.ceil(total / PAGE_SIZE);
  const start = currentPage * PAGE_SIZE + 1;
  const end   = Math.min(start + PAGE_SIZE - 1, total);
  document.getElementById('pageInfo').textContent = `Showing ${start}–${end} of ${total.toLocaleString()}`;

  const btns = document.getElementById('pageBtns');
  btns.innerHTML = '';
  const prev = document.createElement('button');
  prev.className = 'page-btn'; prev.textContent = '← Prev';
  prev.disabled = currentPage === 0;
  prev.onclick = () => { currentPage--; renderTable(); renderPagination(); };
  btns.appendChild(prev);

  const maxVisible = 5;
  const startPage = Math.max(0, currentPage - 2);
  const endPage   = Math.min(pages, startPage + maxVisible);
  for (let i = startPage; i < endPage; i++) {
    const b = document.createElement('button');
    b.className = 'page-btn' + (i === currentPage ? ' active' : '');
    b.textContent = i + 1;
    const p = i;
    b.onclick = () => { currentPage = p; renderTable(); renderPagination(); };
    btns.appendChild(b);
  }

  const next = document.createElement('button');
  next.className = 'page-btn'; next.textContent = 'Next →';
  next.disabled = currentPage >= pages - 1;
  next.onclick = () => { currentPage++; renderTable(); renderPagination(); };
  btns.appendChild(next);
}

function sortTable(col) {
  if (currentSort.col === col) {
    currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    currentSort.col = col;
    currentSort.dir = 'asc';
  }
  currentPage = 0;
  applyFilters();
}

loadData();
</script>
